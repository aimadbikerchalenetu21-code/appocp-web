<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1c3b72;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f2347;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#18c947;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#13a538;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
    <filter id="logoshadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
    <clipPath id="roundedRect">
      <rect x="0" y="0" width="1024" height="1024" rx="220" ry="220"/>
    </clipPath>
  </defs>

  <!-- Rounded background -->
  <rect x="0" y="0" width="1024" height="1024" rx="220" ry="220" fill="url(#bgGrad)"/>

  <!-- Subtle grid overlay -->
  <g opacity="0.05" clip-path="url(#roundedRect)">
    <line x1="0" y1="200" x2="1024" y2="200" stroke="#ffffff" stroke-width="1"/>
    <line x1="0" y1="400" x2="1024" y2="400" stroke="#ffffff" stroke-width="1"/>
    <line x1="0" y1="600" x2="1024" y2="600" stroke="#ffffff" stroke-width="1"/>
    <line x1="0" y1="800" x2="1024" y2="800" stroke="#ffffff" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="1024" stroke="#ffffff" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="1024" stroke="#ffffff" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="1024" stroke="#ffffff" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="1024" stroke="#ffffff" stroke-width="1"/>
  </g>

  <!-- Glow circle -->
  <circle cx="512" cy="500" r="320" fill="#13a538" opacity="0.06"/>

  <!-- OCP LOGO (top center) -->
  <g transform="translate(512, 148) scale(1)" filter="url(#logoshadow)">
    <g transform="translate(-110, -60) scale(1.15)">
      <g fill="#ffffff">
        <ellipse cx="28" cy="52" rx="7" ry="13" transform="rotate(-60 28 52)"/>
        <ellipse cx="18" cy="38" rx="6" ry="11" transform="rotate(-45 18 38)"/>
        <ellipse cx="13" cy="22" rx="5" ry="10" transform="rotate(-30 13 22)"/>
        <ellipse cx="16" cy="7"  rx="4" ry="8"  transform="rotate(-10 16 7)"/>
        <line x1="30" y1="60" x2="48" y2="62" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
      </g>
      <g fill="#ffffff" transform="translate(192,0) scale(-1,1)">
        <ellipse cx="28" cy="52" rx="7" ry="13" transform="rotate(-60 28 52)"/>
        <ellipse cx="18" cy="38" rx="6" ry="11" transform="rotate(-45 18 38)"/>
        <ellipse cx="13" cy="22" rx="5" ry="10" transform="rotate(-30 13 22)"/>
        <ellipse cx="16" cy="7"  rx="4" ry="8"  transform="rotate(-10 16 7)"/>
        <line x1="30" y1="60" x2="48" y2="62" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
      </g>
      <g transform="translate(96,35)" fill="#13a538">
        <ellipse cx="0" cy="-20" rx="7" ry="14"/>
        <ellipse cx="0" cy="-20" rx="7" ry="14" transform="rotate(60)"/>
        <ellipse cx="0" cy="-20" rx="7" ry="14" transform="rotate(120)"/>
        <ellipse cx="0" cy="-20" rx="7" ry="14" transform="rotate(180)"/>
        <ellipse cx="0" cy="-20" rx="7" ry="14" transform="rotate(240)"/>
        <ellipse cx="0" cy="-20" rx="7" ry="14" transform="rotate(300)"/>
        <circle cx="0" cy="0" r="8" fill="#ffffff"/>
        <circle cx="0" cy="0" r="4" fill="#13a538"/>
      </g>
    </g>
    <text x="0" y="52" text-anchor="middle"
          font-family="Arial Black, Arial" font-size="88" font-weight="900"
          fill="#ffffff" letter-spacing="6">OCP</text>
  </g>

  <line x1="200" y1="232" x2="824" y2="232" stroke="#13a538" stroke-width="2.5" opacity="0.5"/>

  <!-- CLIPBOARD -->
  <rect x="288" y="268" width="448" height="520" rx="28" ry="28" fill="#ffffff" filter="url(#shadow)"/>
  <rect x="396" y="232" width="232" height="80" rx="18" ry="18" fill="url(#greenGrad)"/>
  <rect x="444" y="246" width="136" height="24" rx="12" ry="12" fill="#0c7a28"/>
  <circle cx="512" cy="272" r="14" fill="#1c3b72"/>

  <!-- Task 1 - OK -->
  <rect x="316" y="308" width="392" height="58" rx="12" ry="12" fill="#f0faf3"/>
  <circle cx="356" cy="337" r="17" fill="url(#greenGrad)"/>
  <polyline points="347,337 354,345 368,328" stroke="#ffffff" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <rect x="385" y="326" width="150" height="9" rx="4" fill="#1c3b72" opacity="0.45"/>
  <rect x="385" y="343" width="95" height="7" rx="3" fill="#1c3b72" opacity="0.22"/>
  <rect x="618" y="325" width="52" height="22" rx="11" fill="url(#greenGrad)"/>
  <text x="644" y="340" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#ffffff">OK</text>

  <!-- Task 2 - En cours -->
  <rect x="316" y="378" width="392" height="58" rx="12" ry="12" fill="#fffdf0"/>
  <circle cx="356" cy="407" r="17" fill="#f5a623"/>
  <circle cx="356" cy="407" r="9" stroke="#ffffff" stroke-width="2.5" fill="none"/>
  <line x1="356" y1="401" x2="356" y2="407" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="356" y1="407" x2="362" y2="410" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
  <rect x="385" y="396" width="130" height="9" rx="4" fill="#1c3b72" opacity="0.45"/>
  <rect x="385" y="413" width="85" height="7" rx="3" fill="#1c3b72" opacity="0.22"/>
  <rect x="604" y="395" width="76" height="22" rx="11" fill="#f5a623"/>
  <text x="642" y="410" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#ffffff">En cours</text>

  <!-- Task 3 - NOK -->
  <rect x="316" y="448" width="392" height="58" rx="12" ry="12" fill="#fff5f5"/>
  <circle cx="356" cy="477" r="17" fill="#e74c3c"/>
  <line x1="348" y1="469" x2="364" y2="485" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="364" y1="469" x2="348" y2="485" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round"/>
  <rect x="385" y="466" width="145" height="9" rx="4" fill="#1c3b72" opacity="0.45"/>
  <rect x="385" y="483" width="78" height="7" rx="3" fill="#1c3b72" opacity="0.22"/>
  <rect x="614" y="465" width="56" height="22" rx="11" fill="#e74c3c"/>
  <text x="642" y="480" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#ffffff">NOK</text>

  <!-- Task 4 - Bloqué -->
  <rect x="316" y="518" width="392" height="58" rx="12" ry="12" fill="#f7f7f7"/>
  <circle cx="356" cy="547" r="17" fill="#9b9b9b"/>
  <rect x="348" y="545" width="16" height="11" rx="3" fill="#ffffff"/>
  <path d="M350,545 Q350,537 356,537 Q362,537 362,545" stroke="#ffffff" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <rect x="385" y="536" width="120" height="9" rx="4" fill="#1c3b72" opacity="0.35"/>
  <rect x="385" y="553" width="80" height="7" rx="3" fill="#1c3b72" opacity="0.2"/>
  <rect x="606" y="535" width="64" height="22" rx="11" fill="#9b9b9b"/>
  <text x="638" y="550" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#ffffff">Bloqué</text>

  <!-- Progress section -->
  <rect x="316" y="592" width="392" height="84" rx="12" ry="12" fill="#f0f4ff"/>
  <text x="512" y="618" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#1c3b72">Taux de réalisation</text>
  <rect x="338" y="632" width="340" height="14" rx="7" fill="#dde3f0"/>
  <rect x="338" y="632" width="221" height="14" rx="7" fill="url(#greenGrad)"/>
  <text x="692" y="644" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#13a538">65%</text>

  <!-- Bottom subtitle -->
  <text x="512" y="960" text-anchor="middle" font-family="Arial" font-size="17" font-weight="600" fill="#13a538" letter-spacing="3">SUIVI DES TRAVAUX</text>
</svg>
